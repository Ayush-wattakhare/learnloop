{% extends "base.html" %}

{% block title %}Create Group — LearnLoop{% endblock %}

{% block content %}
<div class="container" style="max-width:600px">
  <div style="margin-bottom:24px">
    <h3 style="font-weight:800; font-size:1.3rem">📚 Create Study Group</h3>
    <p class="text-muted">Start a new study group and invite your classmates</p>
  </div>

  <div class="card">
    <div class="card-body">
      <form method="POST" action="/create-group">
        <div class="form-group">
          <label class="form-label">Group Name</label>
          <input class="form-control" type="text" name="group_name" placeholder="e.g. Python Warriors 🐍" required>
        </div>

        <div class="form-group">
          <label class="form-label">Subject</label>
          <input class="form-control" type="text" name="subject" placeholder="e.g. Python Programming" required>
        </div>

        <div class="form-group">
          <label class="form-label">Semester</label>
          <select class="form-control" name="semester" required>
            <option value="">Select Semester</option>
            <option value="1">Semester 1</option>
            <option value="2">Semester 2</option>
            <option value="3" {% if session.semester == 3 %}selected{% endif %}>Semester 3</option>
            <option value="4">Semester 4</option>
            <option value="5">Semester 5</option>
            <option value="6">Semester 6</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Description (Optional)</label>
          <textarea class="form-control" name="description" placeholder="What will this group focus on? Study goals, meeting times, etc."></textarea>
        </div>

        <div class="form-group">
          <label class="form-label" style="display:flex; align-items:center; gap:8px">
            <input type="checkbox" name="is_public" checked style="width:18px; height:18px">
            <span>Make this group public</span>
          </label>
          <small class="text-muted">Public groups are visible to everyone and students studying the same subject will be notified</small>
        </div>

        <div style="display:flex; gap:10px">
          <button type="submit" class="btn btn-primary" style="flex:1; justify-content:center">
            Create Group →
          </button>
          <a href="/groups" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
