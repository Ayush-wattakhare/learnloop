{% extends "base.html" %}

{% block title %}Login — LearnLoop{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-title">Welcome Back! 👋</div>
    <div class="auth-subtitle">Login to LearnLoop — Invertis University</div>
    
    <form method="POST" action="/login">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-control" type="email" name="email" placeholder="your@email.com" required>
      </div>
      
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position: relative;">
          <input class="form-control" type="password" name="password" id="loginPassword" placeholder="Enter your password" required style="padding-right: 45px;">
          <button type="button" onclick="togglePassword('loginPassword', 'loginToggleIcon')" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.2rem; padding: 5px;">
            <span id="loginToggleIcon">👁️</span>
          </button>
        </div>
      </div>
      
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:10px">
        Login to Dashboard →
      </button>
    </form>
    
    <div class="auth-footer">
      Don't have an account? <a href="/register">Create one here</a>
    </div>
  </div>
</div>

<script>
function togglePassword(inputId, iconId) {
  const passwordInput = document.getElementById(inputId);
  const toggleIcon = document.getElementById(iconId);
  
  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    toggleIcon.textContent = '🙈';
  } else {
    passwordInput.type = 'password';
    toggleIcon.textContent = '👁️';
  }
}
</script>
{% endblock %}
