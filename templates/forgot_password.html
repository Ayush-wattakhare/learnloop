<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - LearnLoop</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <!-- Navbar -->
  <div class="navbar">
    <a href="/" class="navbar-brand"><span>📚</span> LearnLoop</a>
    <div class="navbar-links">
      <a href="/" class="nav-link">Home</a>
      <a href="/login" class="nav-link">Login</a>
      <a href="/register"><button class="nav-badge">Get Started →</button></a>
    </div>
  </div>

  <!-- Flash Messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash-message flash-{{ category }}">
          {{ message }}
          <button onclick="this.parentElement.remove()" style="background:none;border:none;color:inherit;cursor:pointer;font-size:1.2rem;padding:0 8px">×</button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <!-- Auth Container -->
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-title">Reset Password 🔐</div>
      <div class="auth-subtitle">Enter your email to receive an OTP</div>
      
      <form method="POST" action="/forgot-password">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input class="form-control" type="email" name="email" placeholder="your.email@example.com" required>
        </div>
        
        <button type="submit" class="btn-auth">Send OTP</button>
      </form>
      
      <div class="auth-footer">
        Remember your password? <a href="/login">Login</a>
      </div>
    </div>
  </div>
</body>
</html>
