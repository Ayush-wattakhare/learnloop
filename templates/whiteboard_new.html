<!-- Floating Whiteboard - Complete Rewrite -->
<div class="whiteboard-floating" id="whiteboardFloating" style="display: none;">
    <div class="whiteboard-header" id="whiteboardHeader">
        <div class="whiteboard-title">
            <span>📝</span>
            <span>Whiteboard</span>
        </div>
        <div class="whiteboard-controls">
            <button class="header-btn" onclick="minimizeWhiteboard()" title="Minimize">
                <span>−</span>
            </button>
            <button class="header-btn" onclick="toggleWhiteboardSize()" title="Maximize/Restore">
                <span id="resizeIcon">⛶</span>
            </button>
            <button class="header-btn" onclick="closeWhiteboard()" title="Close">
                <span>×</span>
            </button>
        </div>
    </div>
    
    <div class="whiteboard-toolbar" id="whiteboardToolbar">
        <button class="tool-btn active" id="penTool" onclick="selectTool('pen')" title="Pen">
            <span>✏️</span>
        </button>
        <button class="tool-btn" id="textTool" onclick="selectTool('text')" title="Text">
            <span>🔤</span>
        </button>
        <button class="tool-btn" id="eraserTool" onclick="selectTool('eraser')" title="Eraser">
            <span>🧹</span>
        </button>
        <div class="color-picker">
            <input type="color" id="colorPicker" value="#000000" onchange="changeColor(this.value)">
        </div>
        <div class="size-picker">
            <label>Size:</label>
            <input type="range" id="sizePicker" min="1" max="20" value="3" oninput="changeSize(this.value)">
            <span id="sizeValue">3</span>
        </div>
        <button class="tool-btn" onclick="clearWhiteboardCanvas()" title="Clear All">
            <span>🗑️</span>
        </button>
        <button class="tool-btn" onclick="saveWhiteboardImage()" title="Save">
            <span>💾</span>
        </button>
    </div>
    
    <div class="whiteboard-content" id="whiteboardContent">
        <canvas id="whiteboardCanvas"></canvas>
    </div>
    
    <div class="resize-handle" id="resizeHandle"></div>
</div>

<style>
/* Floating Whiteboard Styles */
.whiteboard-floating {
    position: fixed;
    width: 700px;
    height: 550px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    z-index: 10000;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.whiteboard-floating.minimized .whiteboard-toolbar,
.whiteboard-floating.minimized .whiteboard-content {
    display: none;
}

.whiteboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    cursor: move;
    user-select: none;
    flex-shrink: 0;
}

.whiteboard-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 1rem;
}

.whiteboard-controls {
    display: flex;
    gap: 4px;
}

.header-btn {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.2);
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
    font-size: 1.2rem;
    transition: all 0.2s;
}

.header-btn:hover {
    background: rgba(255,255,255,0.3);
}

.whiteboard-toolbar {
    display: flex;
    gap: 8px;
    padding: 12px;
    background: #F9FAFB;
    border-bottom: 1px solid #E5E7EB;
    flex-wrap: wrap;
    align-items: center;
    flex-shrink: 0;
}

.tool-btn {
    padding: 8px 12px;
    border: 2px solid #D1D5DB;
    background: white;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 1.2rem;
}

.tool-btn:hover {
    background: #F3F4F6;
    transform: translateY(-1px);
}

.tool-btn.active {
    background: #7C3AED;
    color: white;
    border-color: #7C3AED;
}

.color-picker {
    display: flex;
    align-items: center;
    gap: 4px;
}

.color-picker input[type="color"] {
    width: 40px;
    height: 36px;
    border: 2px solid #D1D5DB;
    border-radius: 6px;
    cursor: pointer;
}

.size-picker {
    display: flex;
    align-items: center;
    gap: 6px;
}

.size-picker label {
    font-size: 0.85rem;
    color: #6B7280;
    font-weight: 500;
}

.size-picker input[type="range"] {
    width: 100px;
}

#sizeValue {
    font-size: 0.85rem;
    color: #6B7280;
    font-weight: 600;
    min-width: 20px;
}

.whiteboard-content {
    flex: 1;
    overflow: hidden;
    position: relative;
    background: white;
}

#whiteboardCanvas {
    display: block;
    cursor: crosshair;
    width: 100%;
    height: 100%;
}

#whiteboardCanvas.text-mode {
    cursor: text;
}

.resize-handle {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 20px;
    height: 20px;
    cursor: nwse-resize;
    background: linear-gradient(135deg, transparent 50%, #7C3AED 50%);
    border-bottom-right-radius: 12px;
}
</style>

<script>
// Whiteboard State
let currentTool = 'pen';
let currentColor = '#000000';
let currentSize = 3;
let isDrawing = false;
let lastX = 0;
let lastY = 0;

// Drag State
let isDraggingWhiteboard = false;
let dragOffsetX = 0;
let dragOffsetY = 0;

// Resize State
let isResizingWhiteboard = false;
let resizeStartX = 0;
let resizeStartY = 0;
let resizeStartWidth = 0;
let resizeStartHeight = 0;

// Maximize State
let isMaximized = false;
let savedPosition = { top: 100, left: 100, width: 700, height: 550 };

// Initialize Whiteboard
function openWhiteboard() {
    const whiteboard = document.getElementById('whiteboardFloating');
    
    // Set initial position (centered)
    const centerX = (window.innerWidth - 700) / 2;
    const centerY = (window.innerHeight - 550) / 2;
    whiteboard.style.left = centerX + 'px';
    whiteboard.style.top = centerY + 'px';
    
    whiteboard.style.display = 'flex';
    
    // Initialize canvas
    setTimeout(() => {
        initWhiteboardCanvas();
        setupWhiteboardEvents();
    }, 100);
}

function initWhiteboardCanvas() {
    const canvas = document.getElementById('whiteboardCanvas');
    const container = document.getElementById('whiteboardContent');
    
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
    
    const ctx = canvas.getContext('2d');
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
}

function setupWhiteboardEvents() {
    const canvas = document.getElementById('whiteboardCanvas');
    const header = document.getElementById('whiteboardHeader');
    const resizeHandle = document.getElementById('resizeHandle');
    const whiteboard = document.getElementById('whiteboardFloating');
    
    // Drawing events
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseout', stopDrawing);
    
    // Drag events
    header.addEventListener('mousedown', startDrag);
    
    // Resize events
    resizeHandle.addEventListener('mousedown', startResize);
    
    // Global events
    document.addEventListener('mousemove', handleMouseMove);
    document.addEventListener('mouseup', handleMouseUp);
}

// Drawing Functions
function startDrawing(e) {
    const canvas = document.getElementById('whiteboardCanvas');
    const rect = canvas.getBoundingClientRect();
    
    if (currentTool === 'text') {
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        addText(x, y);
        return;
    }
    
    isDrawing = true;
    lastX = e.clientX - rect.left;
    lastY = e.clientY - rect.top;
}

function draw(e) {
    if (!isDrawing || currentTool === 'text') return;
    
    const canvas = document.getElementById('whiteboardCanvas');
    const ctx = canvas.getContext('2d');
    const rect = canvas.getBoundingClientRect();
    
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(x, y);
    
    if (currentTool === 'pen') {
        ctx.strokeStyle = currentColor;
        ctx.lineWidth = currentSize;
        ctx.globalCompositeOperation = 'source-over';
    } else if (currentTool === 'eraser') {
        ctx.strokeStyle = 'white';
        ctx.lineWidth = currentSize * 3;
        ctx.globalCompositeOperation = 'destination-out';
    }
    
    ctx.stroke();
    
    lastX = x;
    lastY = y;
}

function stopDrawing() {
    isDrawing = false;
}

function addText(x, y) {
    const text = prompt('Enter text:');
    if (!text) return;
    
    const canvas = document.getElementById('whiteboardCanvas');
    const ctx = canvas.getContext('2d');
    
    ctx.font = `${currentSize * 8}px Arial`;
    ctx.fillStyle = currentColor;
    ctx.fillText(text, x, y);
}

// Tool Functions
function selectTool(tool) {
    currentTool = tool;
    
    // Update button states
    document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(tool + 'Tool').classList.add('active');
    
    // Update cursor
    const canvas = document.getElementById('whiteboardCanvas');
    if (tool === 'text') {
        canvas.classList.add('text-mode');
    } else {
        canvas.classList.remove('text-mode');
    }
}

function changeColor(color) {
    currentColor = color;
}

function changeSize(size) {
    currentSize = parseInt(size);
    document.getElementById('sizeValue').textContent = size;
}

function clearWhiteboardCanvas() {
    if (!confirm('Clear the whiteboard?')) return;
    
    const canvas = document.getElementById('whiteboardCanvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function saveWhiteboardImage() {
    const canvas = document.getElementById('whiteboardCanvas');
    const link = document.createElement('a');
    link.download = 'whiteboard.png';
    link.href = canvas.toDataURL();
    link.click();
}

// Window Control Functions
function closeWhiteboard() {
    document.getElementById('whiteboardFloating').style.display = 'none';
}

function minimizeWhiteboard() {
    document.getElementById('whiteboardFloating').classList.toggle('minimized');
}

function toggleWhiteboardSize() {
    const whiteboard = document.getElementById('whiteboardFloating');
    const icon = document.getElementById('resizeIcon');
    
    if (!isMaximized) {
        // Save current position
        savedPosition = {
            top: parseInt(whiteboard.style.top),
            left: parseInt(whiteboard.style.left),
            width: whiteboard.offsetWidth,
            height: whiteboard.offsetHeight
        };
        
        // Maximize
        whiteboard.style.top = '20px';
        whiteboard.style.left = '20px';
        whiteboard.style.width = (window.innerWidth - 40) + 'px';
        whiteboard.style.height = (window.innerHeight - 40) + 'px';
        
        icon.textContent = '◱';
        isMaximized = true;
    } else {
        // Restore
        whiteboard.style.top = savedPosition.top + 'px';
        whiteboard.style.left = savedPosition.left + 'px';
        whiteboard.style.width = savedPosition.width + 'px';
        whiteboard.style.height = savedPosition.height + 'px';
        
        icon.textContent = '⛶';
        isMaximized = false;
    }
    
    setTimeout(() => initWhiteboardCanvas(), 100);
}

// Drag Functions
function startDrag(e) {
    if (e.target.closest('.whiteboard-controls')) return;
    
    isDraggingWhiteboard = true;
    const whiteboard = document.getElementById('whiteboardFloating');
    
    dragOffsetX = e.clientX - whiteboard.offsetLeft;
    dragOffsetY = e.clientY - whiteboard.offsetTop;
    
    e.preventDefault();
}

// Resize Functions
function startResize(e) {
    isResizingWhiteboard = true;
    const whiteboard = document.getElementById('whiteboardFloating');
    
    resizeStartX = e.clientX;
    resizeStartY = e.clientY;
    resizeStartWidth = whiteboard.offsetWidth;
    resizeStartHeight = whiteboard.offsetHeight;
    
    e.preventDefault();
    e.stopPropagation();
}

// Global Mouse Handlers
function handleMouseMove(e) {
    if (isDraggingWhiteboard) {
        const whiteboard = document.getElementById('whiteboardFloating');
        whiteboard.style.left = (e.clientX - dragOffsetX) + 'px';
        whiteboard.style.top = (e.clientY - dragOffsetY) + 'px';
    }
    
    if (isResizingWhiteboard) {
        const whiteboard = document.getElementById('whiteboardFloating');
        const deltaX = e.clientX - resizeStartX;
        const deltaY = e.clientY - resizeStartY;
        
        const newWidth = Math.max(400, resizeStartWidth + deltaX);
        const newHeight = Math.max(300, resizeStartHeight + deltaY);
        
        whiteboard.style.width = newWidth + 'px';
        whiteboard.style.height = newHeight + 'px';
        
        initWhiteboardCanvas();
    }
}

function handleMouseUp() {
    isDraggingWhiteboard = false;
    isResizingWhiteboard = false;
}
</script>
