{% extends "base.html" %}

{% block title %}Register — LearnLoop{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-title">Create Account ✍️</div>
    <div class="auth-subtitle">Join LearnLoop — Invertis University</div>
    
    <form method="POST" action="/register">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input class="form-control" type="text" name="name" placeholder="e.g. Rahul Sharma" required>
      </div>
      
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-control" type="email" name="email" placeholder="your@email.com" required>
      </div>
      
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position: relative;">
          <input class="form-control" type="password" name="password" id="registerPassword" placeholder="Min 8 characters, letters + numbers" required style="padding-right: 45px;">
          <button type="button" onclick="togglePassword('registerPassword', 'registerToggleIcon')" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.2rem; padding: 5px;">
            <span id="registerToggleIcon">👁️</span>
          </button>
        </div>
        <small style="color: #6B7280; font-size: 0.85rem; display: block; margin-top: 4px;">
          Must be at least 8 characters with letters and numbers
        </small>
      </div>
      
      <div class="form-group">
        <label class="form-label">Semester</label>
        <select class="form-control" name="semester" required>
          <option value="">Select Semester</option>
          <option value="1">Semester 1</option>
          <option value="2">Semester 2</option>
          <option value="3">Semester 3</option>
          <option value="4">Semester 4</option>
          <option value="5">Semester 5</option>
          <option value="6">Semester 6</option>
        </select>
      </div>
      
      <div class="form-group">
        <label class="form-label">College</label>
        <input class="form-control" type="text" name="college" value="Invertis University" required>
      </div>
      
      <div class="form-group">
        <label class="form-label">Bio (Optional)</label>
        <textarea class="form-control" name="bio" placeholder="Tell us about yourself, your interests, study preferences..."></textarea>
      </div>
      
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:10px">
        Create Account →
      </button>
    </form>
    
    <div class="auth-footer">
      Already have an account? <a href="/login">Login here</a>
    </div>
  </div>
</div>

<script>
function togglePassword(inputId, iconId) {
  const passwordInput = document.getElementById(inputId);
  const toggleIcon = document.getElementById(iconId);
  
  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    toggleIcon.textContent = '🙈';
  } else {
    passwordInput.type = 'password';
    toggleIcon.textContent = '👁️';
  }
}
</script>
{% endblock %}
