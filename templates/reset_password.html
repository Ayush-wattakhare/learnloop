<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - LearnLoop</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <!-- Navbar -->
  <div class="navbar">
    <a href="/" class="navbar-brand"><span>📚</span> LearnLoop</a>
    <div class="navbar-links">
      <a href="/" class="nav-link">Home</a>
      <a href="/login" class="nav-link">Login</a>
    </div>
  </div>

  <!-- Flash Messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash-message flash-{{ category }}">
          {{ message }}
          <button onclick="this.parentElement.remove()" style="background:none;border:none;color:inherit;cursor:pointer;font-size:1.2rem;padding:0 8px">×</button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <!-- Auth Container -->
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-title">Set New Password 🔑</div>
      <div class="auth-subtitle">Create a strong password for your account</div>
      
      <form method="POST" action="/reset-password">
        <input type="hidden" name="email" value="{{ email }}">
        
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input class="form-control" type="password" name="password" placeholder="Enter new password" minlength="6" required>
          <small style="color: #64748b; font-size: 0.85rem;">Minimum 6 characters</small>
        </div>
        
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input class="form-control" type="password" name="confirm_password" placeholder="Confirm new password" minlength="6" required>
        </div>
        
        <button type="submit" class="btn-auth">Reset Password</button>
      </form>
    </div>
  </div>
</body>
</html>
